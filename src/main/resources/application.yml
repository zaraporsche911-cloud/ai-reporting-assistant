spring:
  application:
    name: ai-reporting-assistant
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/reporting_db}
    username: ${DB_USERNAME:reporting_app}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 5000
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: UTC

server:
  port: ${SERVER_PORT:8090}
  error:
    include-message: never
    include-stacktrace: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

app:
  security:
    jwt-secret: ${JWT_SECRET}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:PT4H}
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5174}
    bcrypt-strength: ${BCRYPT_STRENGTH:10}
  fleet:
    mode: ${FLEET_API_MODE:MOCK}
    base-url: ${FLEET_API_BASE_URL:http://localhost:8080}
    username: ${FLEET_API_USERNAME:}
    password: ${FLEET_API_PASSWORD:}
    token: ${FLEET_API_TOKEN:}
    connect-timeout: ${FLEET_API_CONNECT_TIMEOUT:PT3S}
    read-timeout: ${FLEET_API_READ_TIMEOUT:PT10S}
  ai:
    provider: ${AI_PROVIDER:mock}
    model: ${AI_MODEL:fleetops-rules-v1}
    api-key: ${AI_API_KEY:}
    base-url: ${AI_BASE_URL:https://api.openai.com}
    ollama-base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    azure-endpoint: ${AZURE_OPENAI_ENDPOINT:}
    azure-api-key: ${AZURE_OPENAI_API_KEY:}
    azure-api-version: ${AZURE_OPENAI_API_VERSION:2024-10-21}
    timeout: ${AI_TIMEOUT:PT30S}
