name: fleetops-reporting

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reporting_db}
      POSTGRES_USER: ${POSTGRES_USER:-reporting_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - reporting-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 15
    restart: unless-stopped

  backend:
    build:
      context: .
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-reporting_db}
      DB_USERNAME: ${POSTGRES_USER:-reporting_app}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?Set a random JWT_SECRET of at least 32 bytes in .env}
      CORS_ALLOWED_ORIGINS: http://localhost:${FRONTEND_PORT:-5174}
      FLEET_API_MODE: ${FLEET_API_MODE:-MOCK}
      FLEET_API_BASE_URL: ${FLEET_API_BASE_URL:-http://host.docker.internal:8080}
      FLEET_API_USERNAME: ${FLEET_API_USERNAME:-}
      FLEET_API_PASSWORD: ${FLEET_API_PASSWORD:-}
      FLEET_API_TOKEN: ${FLEET_API_TOKEN:-}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      AI_MODEL: ${AI_MODEL:-fleetops-rules-v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-10-21}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8090}:8090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 4s
      retries: 15
      start_period: 25s
    restart: unless-stopped

  frontend:
    build:
      context: frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5174}:80"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    volumes:
      - reporting-ollama-data:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  reporting-postgres-data:
  reporting-ollama-data:
